<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Math Startup</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; color: #333; }
    </style>
</head>
<body>
    <h2>Square Master 3000</h2>
    <input type="number" id="num" placeholder="Enter a number">
    <br>
    <button onclick="calc()">Calculate Square</button>
    <div id="result"></div>

    <script>
        function calc() {
            let n = document.getElementById('num').value;
            let res = n * n;
            document.getElementById('result').innerHTML = "Result: " + res;
        }
    </script>
</body>
</html>
